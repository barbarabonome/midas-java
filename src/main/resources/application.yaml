spring:
  profiles:
    active: dev
  application:
    name: midas-api


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true


server:
  port: 8080

logging:
  level:
    com.fiap.midasfintech: INFO
    org.springframework.web: DEBUG
